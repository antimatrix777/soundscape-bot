name: Nocturne Noise — Shorts Pipeline

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC diário (6h depois do vídeo longo de 21:00)
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Skip YouTube upload (test only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      # ── FFmpeg ────────────────────────────────────────────
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1

      # ── Roda o pipeline de Shorts ─────────────────────────
      - name: Generate and upload Short
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          FAL_API_KEY:      ${{ secrets.FAL_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:   ${{ secrets.PEXELS_API_KEY }}
          YT_TOKEN_B64:     ${{ secrets.YT_TOKEN_B64 }}
        run: |
          if [ "${{ inputs.skip_upload }}" = "true" ]; then
            echo "⚠️  Upload desabilitado (modo teste)"
            python step6_shorts.py --skip-upload || true
          else
            python step6_shorts.py
          fi

      # ── Report ────────────────────────────────────────────
      - name: Report result
        if: always()
        run: |
          if [ -f "last_short.json" ]; then
            echo "✅ SHORT PUBLICADO"
            cat last_short.json
          else
            echo "⚠️  last_short.json não encontrado"
          fi

      # ── Cleanup ───────────────────────────────────────────
      - name: Cleanup artifacts
        if: always()
        run: |
          rm -f yt_audio_raw.* short_audio.mp3 short_final.mp4 short_thumb.jpg short_frame.jpg
